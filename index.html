<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momin Call App</title>
    <style>
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .dialer-container { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 280px; }
        .screen input { width: 100%; border: none; font-size: 32px; text-align: center; margin-bottom: 20px; outline: none; color: #333; }
        .keypad .row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .keypad button { width: 65px; height: 65px; border-radius: 50%; border: none; background: #eee; font-size: 22px; cursor: pointer; }
        .actions { display: flex; justify-content: space-between; margin-top: 25px; }
        .call-btn { background: #2ecc71; color: white; flex-grow: 2; margin-right: 10px; border-radius: 35px; border: none; height: 55px; font-weight: bold; cursor: pointer; }
        .del-btn { background: #e74c3c; color: white; flex-grow: 1; border-radius: 35px; border: none; height: 55px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="dialer-container">
    <div class="screen"><input type="text" id="display" placeholder="0" readonly></div>
    <div class="keypad">
        <div class="row"><button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button></div>
        <div class="row"><button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button></div>
        <div class="row"><button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button></div>
        <div class="row"><button onclick="press('*')">*</button><button onclick="press('0')">0</button><button onclick="press('#')">#</button></div>
    </div>
    <div class="actions">
        <button class="call-btn" onclick="makeCall()">CALL</button>
        <button class="del-btn" onclick="clr()">DEL</button>
    </div>
    <div id="status">Status: Ready</div>
</div>

<script>
    function press(n) { document.getElementById('display').value += n; }
    function clr() { document.getElementById('display').value = ""; }
    function makeCall() {
        let num = document.getElementById('display').value;
        if(num) {
            document.getElementById('status').innerText = "Status: Calling " + num + "...";
            // For WebRTC implementation, you will need a signaling server like Firebase.
        }
    }
</script>

</body>
</html>
